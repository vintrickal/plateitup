name: plateitup
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  auto_size_text: ^3.0.0
  badges: ^3.2.0
  bloc: ^8.1.4
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  cached_network_image: ^3.4.0
  # MVP mode: cloud_firestore types are still used everywhere as compile-time
  # types, but at runtime every `.collection` getter routes to
  # `fake_cloud_firestore` (see lib/mock/mock_firestore.dart). No network
  # calls happen. firebase_* plugins that needed native code (auth, storage,
  # performance, google_sign_in, sign_in_with_apple) have been removed.
  cloud_firestore: ^4.15.8
  cloud_firestore_platform_interface: ^6.1.9
  cloud_firestore_web: ^3.10.8
  fake_cloud_firestore: ^2.5.2
  collection: ^1.19.0
  dropdown_button2: ^2.3.9
  easy_debounce: ^2.0.3
  expandable: ^5.0.1
  file_picker: ^8.0.0+1
  flutter_animate: ^4.5.2
  flutter_cache_manager: ^3.4.1
  flutter_local_notifications: ^18.0.1
  flutter_plugin_android_lifecycle: ^2.0.23
  flutter_rating_bar: ^4.0.1
  font_awesome_flutter: ^10.8.0
  from_css_color: ^2.0.0
  go_router: ^14.8.1
  google_fonts: ^6.3.0
  image_picker: ^1.1.2
  image_picker_android: ^0.8.13
  image_picker_for_web: ^3.0.2
  image_picker_ios: ^0.8.13
  image_picker_platform_interface: ^2.11.0
  intl: ^0.19.0
  json_path: ^0.7.6
  mime_type: ^1.0.1
  page_transition: ^2.2.2
  path_provider: ^2.1.5
  path_provider_android: ^2.2.17
  path_provider_foundation: ^2.4.1
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8
  rxdart: ^0.27.7  # MVP: pinned to ^0.27 for fake_cloud_firestore ^2.5 compat
  shared_preferences: ^2.2.3
  shared_preferences_android: ^2.4.0
  shared_preferences_foundation: ^2.5.3
  shared_preferences_platform_interface: ^2.4.1
  shared_preferences_web: ^2.2.2
  sqflite: ^2.4.1
  stream_transform: ^2.1.1
  text_search: ^1.0.2
  time_picker_spinner: ^1.0.2
  timeago: ^3.7.1
  url_launcher: ^6.3.2
  url_launcher_android: ^6.3.17
  url_launcher_ios: ^6.3.3
  url_launcher_platform_interface: ^2.3.2
  video_player: ^2.10.0
  video_player_android: ^2.8.4
  video_player_avfoundation: ^2.8.4
  video_player_platform_interface: ^6.4.0
  video_player_web: ^2.2.0


  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.0

dependency_overrides:
  http: ^1.2.2
  uuid: ^4.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0
  image: ^4.5.4
  lints: ^5.1.1

  flutter_test:
    sdk: flutter


flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  image_path: 'assets/images/app_launcher_icon.png'


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/fonts/
    - assets/images/
    - assets/videos/
    - assets/audios/
    - assets/lottie_animations/
    - assets/rive_animations/
    - assets/pdfs/

  
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages

