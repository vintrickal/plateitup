org.gradle.jvmargs=-Xmx4608m
android.useAndroidX=true
android.enableJetifier=true
android.enableR8=true

# Disable Kotlin incremental compilation. The project lives on D:\ but the
# pub cache lives on C:\, and Kotlin's RelocatableFileToPathConverter throws
# `IllegalArgumentException: this and base files have different roots` when
# it tries to compute relative paths across drive letters. See KT-66248.
# Full Gradle caching still applies; only Kotlin-IC is off.
kotlin.incremental=false
